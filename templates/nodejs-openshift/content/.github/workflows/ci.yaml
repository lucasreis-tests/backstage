name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate DEV
        run: kubectl kustomize deploy/overlays/dev > /dev/null && echo "✓ DEV"
      - name: Validate PROD
        run: kubectl kustomize deploy/overlays/prod > /dev/null && echo "✓ PROD"
