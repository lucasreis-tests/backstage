apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-openshift-template
  title: Node.js Backend → OpenShift (ArgoCD GitOps)
  description: Backend Node.js/Express completo com deploy GitOps no OpenShift via ArgoCD — inclui código, Dockerfile, Kustomize (DEV/PROD) e ArgoCD Applications
  tags:
    - nodejs
    - openshift
    - argocd
    - gitops
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Informações do Serviço
      description: |
        ### 🚀 Backend Node.js com deploy GitOps no OpenShift

        Este template gera **um único repositório** com tudo que você precisa: o código da aplicação e toda a estrutura de deploy.

        **O que é gerado:**

        | Camada | O que contém |
        |---|---|
        | **Aplicação** | Express, health check, CRUD, testes, Dockerfile multi-stage |
        | **Deploy Base** | Deployment, Service, ConfigMap (Kustomize) |
        | **Overlay DEV** | 1 réplica, menos recursos, LOG_LEVEL=debug, sync manual |
        | **Overlay PROD** | 3 réplicas, HPA, PDB, LOG_LEVEL=info, auto sync + self-heal |
        | **ArgoCD** | 2 Applications — uma para DEV, outra para PROD |
        | **CI** | GitHub Actions — testes + validação kustomize |

        ---

        **Fluxo completo:**
        1. Você preenche o formulário abaixo
        2. O Backstage cria o repositório no GitHub com tudo pronto
        3. Você aplica os ArgoCD Applications no cluster: `oc apply -f deploy/argocd/`
        4. O ArgoCD sincroniza automaticamente os manifests com o OpenShift
        5. A cada push no Git, o ArgoCD detecta e atualiza o deploy
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Nome do Serviço
          type: string
          description: Nome único (minúsculo, apenas hífens). Será usado como nome do repo, deployment, service e ArgoCD app.
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Descrição
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        port:
          title: Porta
          type: number
          default: 3000

    - title: Configuração do Deploy no OpenShift
      description: |
        Configure os namespaces e o ArgoCD.

        **Diferenças entre os ambientes:**

        | | DEV | PROD |
        |---|---|---|
        | Réplicas | 1 | 3 |
        | CPU | 100m / 500m | 250m / 1000m |
        | Memória | 128Mi / 256Mi | 256Mi / 512Mi |
        | Auto-scaling | Não | HPA 2-6 pods |
        | PodDisruptionBudget | Não | minAvailable: 1 |
        | ArgoCD Sync | Manual | Auto + self-heal |
        | LOG_LEVEL | debug | info |
      properties:
        dev_namespace:
          title: Namespace DEV
          type: string
          default: dev
        prod_namespace:
          title: Namespace PROD
          type: string
          default: prod
        argocd_namespace:
          title: Namespace do ArgoCD
          type: string
          default: openshift-gitops
        argocd_server:
          title: URL do Cluster destino
          type: string
          default: https://kubernetes.default.svc

  steps:
    - id: fetch-base
      name: Gerar código e manifests
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          dev_namespace: ${{ parameters.dev_namespace }}
          prod_namespace: ${{ parameters.prod_namespace }}
          argocd_namespace: ${{ parameters.argocd_namespace }}
          argocd_server: ${{ parameters.argocd_server }}

    - id: publish
      name: Publicar no GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=lucasreis-tests&repo=${{ parameters.name }}
        description: ${{ parameters.description }}
        repoVisibility: public
        defaultBranch: main

    - id: register
      name: Registrar no Catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Abrir no Catálogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
