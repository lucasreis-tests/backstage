apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-backend-template
  title: Node.js Backend (Express)
  description: Production-ready Node.js backend with Express, health checks, Dockerfile and CI/CD
  tags:
    - nodejs
    - express
    - backend
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Service Info
      description: |
        ### O que este template gera

        Um **repositório GitHub** com backend Node.js/Express production-ready.

        **Incluído:**

        | Componente | Detalhes |
        |---|---|
        | **Express** | Helmet, CORS, compression, structured logging (pino) |
        | **Health Check** | Endpoint `/healthcheck` |
        | **CRUD exemplo** | Rotas REST com validação |
        | **Testes** | Node.js test runner nativo |
        | **Dockerfile** | Multi-stage build com dumb-init e non-root user |
        | **CI/CD** | GitHub Actions (test → build → push ECR) |
        | **Catalog** | `catalog-info.yaml` para registro automático no Backstage |
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: Unique name (lowercase, hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          description: Owner group or user
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]
        port:
          title: Port
          type: number
          default: 3000
          description: HTTP port for the service

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=lucasreis-tests&repo=${{ parameters.name }}
        description: ${{ parameters.description }}
        repoVisibility: public
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
